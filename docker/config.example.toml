[server]
host = "0.0.0.0"
port = 22217

# Danh sách Origin CORS được phép (mặc định ["http://localhost:22217"])
# Đặt ["*"] để cho phép mọi Origin (không khuyến nghị cho môi trường production)
# cors_origins = ["http://localhost:22217"]

# API Key và mật khẩu quản trị được cấu hình qua bảng quản trị Web (http://0.0.0.0:22217/admin)
# Lần đầu truy cập sẽ được hướng dẫn đặt mật khẩu quản trị, sau đó có thể tạo/quản lý API Key trong bảng quản trị.
# Cấu hình Admin (bảng quản trị tự quản lý, khi triển khai không cần điền thủ công)
# [admin]
# password_hash = ""
# jwt_secret = ""
# jwt_issued_at = 0

# Danh sách API Key (bảng quản trị tự quản lý, khi triển khai không cần điền thủ công)
# [[api_keys]]
# key = "sk-xxx"
# description = "API Key của tôi"
# created_at = 1700000000

# Danh sách tài khoản (thêm qua bảng quản trị, phần này chỉ để tham khảo)
# [[accounts]]
# email = "user@example.com"
# mobile = ""
# area_code = ""
# password = "pass"

[deepseek]
# Cấu hình thẻ gọi công cụ
# Có khớp mờ tích hợp: ký tự toàn chiều rộng `｜` (U+FF5C) và `▁` (U+2581)
# lần lượt tương đương ASCII `|` và `_`, tự phủ hầu hết biến thể ảo giác cấp ký tự.
# extra dùng cho thẻ dự phòng có định dạng hoàn toàn khác (ví dụ <tool_call>):
# tool_call.extra_starts = ["<|tool_call_begin|>", "<tool_calls>", "<tool_call>"]
# tool_call.extra_ends = ["<|tool_call_end|>", "</tool_calls>", "</tool_call>"]

# User-Agent đã xác minh hoạt động (giả lập client Android)
# user_agent = "DeepSeek/2.0.4 Android/35"

# Địa chỉ API gốc (mặc định)
# api_base = "https://chat.deepseek.com/api/v0"

# URL đầy đủ của tệp WASM (cần cho PoW; số phiên bản có thể đổi, nên cập nhật thủ công)
# wasm_url = "https://fe-static.deepseek.com/chat/static/sha3_wasm_bg.7b9ca65ddd.wasm"

# Header X-Client-Version (dùng cho model expert và tính năng tương tự)
# client_version = "2.0.4"

# Header X-Client-Platform
# client_platform = "android"

# Header X-Client-Locale
# client_locale = "vi_VN"

# Danh sách loại mô hình được hỗ trợ; mỗi loại tự ánh xạ thành model_id OpenAI: deepseek-<type>
model_types = ["default", "expert", "vision"]
max_input_tokens = [1048576, 1048576, 1048576]
max_output_tokens = [384000, 384000, 384000]
input_character_limits = [2621440, 163840, 2621440]

# Bí danh mô hình, căn theo index với model_types; có thể đặt nhiều alias ngăn bằng dấu phẩy.
# Hậu tố -nothinking tự tắt thinking_enabled, giống dropdown ds2api.
model_aliases = [
  "deepseek-v4-flash, deepseek-v4-flash-nothinking, deepseek-v4-flash-search, deepseek-v4-flash-search-nothinking",
  "deepseek-v4-pro, deepseek-v4-pro-nothinking, deepseek-v4-pro-search, deepseek-v4-pro-search-nothinking",
  "deepseek-v4-vision, deepseek-v4-vision-nothinking",
]

# Cấu hình proxy (tùy chọn, vượt giới hạn khu vực CloudFront WAF)
# Dùng node proxy ngoài Hoa Kỳ có thể tránh WAF Challenge
# [proxy]
# url = "http://127.0.0.1:7890"
# url = "socks5://127.0.0.1:7891"
